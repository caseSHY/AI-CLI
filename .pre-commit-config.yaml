repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [src/, project/tests/]
      - id: ruff-format
        args: [src/, project/tests/]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy src/aicoreutils/ --strict
        language: system
        types: [python]
        pass_filenames: false
