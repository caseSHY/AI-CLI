name: Bug Report
description: Report a bug in aicoreutils
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of aicoreutils?
      placeholder: "1.1.2"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Linux, macOS, Windows, WSL, Docker]
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug and include the exact command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: Paste the JSON output (stdout and stderr).
      render: json
