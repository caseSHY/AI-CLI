name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like aicoreutils to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Is this a new command, a CLI flag, a behavior change, or docs?
      options: [New command, New CLI flag, Behavior change, Documentation, MCP, Other]
