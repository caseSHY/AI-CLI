name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils
      - name: Install package and test deps
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-report=xml --cov-fail-under=45
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ubuntu-${{ matrix.python-version }}
          path: coverage.xml

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: brew install coreutils
      - name: Install package and test deps
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest tests/ tests/test_version_consistency.py -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-fail-under=45

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install GNU coreutils (for differential tests)
        run: choco install gnuwin32-coreutils.portable --no-progress -y
        continue-on-error: true
      - name: Install package and test deps
        run: uv sync --extra dev
      - name: Run tests with coverage
        env:
          PYTHONIOENCODING: utf-8
        run: uv run pytest tests/ tests/test_version_consistency.py -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-fail-under=45

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/ scripts/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: uv sync --extra dev
      - name: Mypy type check
        run: uv run mypy src/aicoreutils/ --strict

  status-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install package
        run: uv sync --extra dev
      - name: Verify CURRENT_STATUS.md consistency
        run: uv run python scripts/generate_status.py
      - name: Verify command risk/test matrix
        run: uv run python scripts/audit_command_matrix.py
      - name: Verify command spec registry
        run: uv run python scripts/audit_command_specs.py
      - name: Verify supply-chain posture
        run: uv run python scripts/audit_supply_chain.py

  governance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: uv sync --extra dev
      - name: Run release gate
        run: uv run python scripts/release_gate.py
