name: CI

on:
  push:
  pull_request:

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get install -y coreutils
      - name: Install package and test deps
        run: python -m pip install -e ".[test,dev]"
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: python -m pytest project/tests/ -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-fail-under=25

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: brew install coreutils
      - name: Install package and test deps
        run: python -m pip install -e ".[test,dev]"
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: python -m pytest project/tests/ -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-fail-under=25

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test deps
        run: python -m pip install -e ".[test,dev]"
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
          PYTHONIOENCODING: utf-8
        run: python -m pytest project/tests/ -v --tb=short --cov=src/aicoreutils --cov-report=term-missing --cov-fail-under=25

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ project/tests/
      - name: Ruff format check
        run: ruff format --check src/ project/tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: python -m pip install -e ".[dev]"
      - name: Mypy type check
        run: mypy src/aicoreutils/ --strict
