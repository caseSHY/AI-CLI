name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Verify release tag matches pyproject version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="v$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag $TAG_VERSION != pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version check: $TAG_VERSION == $PKG_VERSION OK"
      - name: Verify metadata consistency
        run: uv run python scripts/check_metadata_consistency.py
      - name: Install build tools
        run: uv sync && uv pip install build twine
      - name: Build package
        run: uv run python -m build
      - name: Check metadata
        run: uv run twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install package
        run: uv sync
      - name: Extract changelog for release notes
        run: uv run python scripts/generate_status.py --changelog-latest > release_notes.md
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ github.token }}
